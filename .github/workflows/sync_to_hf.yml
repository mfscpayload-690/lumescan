name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create a fresh, temporary directory for the push
          mkdir deploy_dir
          
          # Copy only the files needed for the backend (preserve folder structure)
          cp -r server deploy_dir/
          cp Dockerfile deploy_dir/
          cp README.md deploy_dir/
          
          # Go into the deploy directory and start a BRAND NEW git repo
          cd deploy_dir
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Add everything and push - this has ZERO history of the binary files
          git add .
          git commit -m "deploy: fresh backend build"
          git push -f https://mfscpayload-690:$HF_TOKEN@huggingface.co/spaces/mfscpayload-690/lumescan-api main
